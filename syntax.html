<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GameScript - syntax</title>
  <link rel="icon" type="image/svg" href="assets/images/logo.svg">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="main.js" defer></script>
  <style>
    .syntax-layout {
      display: flex;
      gap: 1.5rem;
      margin: 2rem auto;
      max-width: 1500px;
      align-items: flex-start;
    }

    /* Thin left panel */
    .syntax-nav {
      width: 220px;
      flex-shrink: 0;
      background: white;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      position: sticky;
      top: 1rem;
    }

    .syntax-nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #154f55;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .syntax-nav-item:hover {
      background: rgba(240,106,77,0.08);
    }

    .syntax-nav-item.active {
      background: #f06a4d;
      color: white;
    }

    /* Thick right panel */
    .syntax-content {
      flex: 1;
      min-width: 0;
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .syntax-content h4 {
      color: #154f55;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .syntax-content p {
      color: #555;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
    }

    .code-block {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #d4d4d4;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      white-space: pre;
    }

    /* Syntax highlighting colours */
    .kw  { color: #c792ea; } /* keywords */
    .ty  { color: #82aaff; } /* types */
    .st  { color: #c3e88d; } /* strings */
    .nm  { color: #f78c6c; } /* numbers */
    .cm  { color: #546e7a; font-style: italic; } /* comments */
    .fn  { color: #82aaff; } /* function names */
    .op  { color: #89ddff; } /* operators */

    .try-btn {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.5rem 1.25rem;
      background: #f06a4d;
      color: white;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .try-btn:hover { opacity: 0.85; }
    @media (max-width: 768px) {
  .playground-container,
  .syntax-layout {
    flex-direction: column;
  }

  .syntax-nav {
    width: 100%;
    position: static;
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
    padding: 0.5rem;
  }

  .syntax-nav-item {
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
  }

  .CodeMirror,
  .output-content {
    height: 300px;
  }
}
  </style>
</head>
<body class="flex flex-col min-h-screen">

<header class="navbar-bar">
  <div class="navbar-content container mx-auto flex items-center justify-between p-4 flex-wrap">
    <a href="index.html" class="flex items-center space-x-2">
      <img src="assets/images/logo.png" alt="Logo" class="h-12 w-12 md:h-20 md:w-20 object-contain">
    </a>
    <button id="menu-btn" class="md:hidden focus:outline-none"></button>
    <nav class="navbar-links hidden md:flex flex-wrap justify-evenly text-base md:text-xl font-semibold w-full md:w-auto mt-4 md:mt-0 space-y-2 md:space-y-0 md:space-x-4">
      <a href="index.html" class="navbar-toplink">Home</a>
      <a href="install.html" class="navbar-toplink">Install</a>
      <a href="play.html" class="navbar-toplink">Playground</a>
      <a href="syntax.html" class="navbar-toplink active">Syntax</a>
      <a href="blog.html" class="navbar-toplink">Blog</a>
    </nav>
  </div>
</header>

<main class="w-full px-4 md:px-8">

  <div class="syntax-layout">

    <!-- Left: nav -->
    <div class="syntax-nav">
      <button class="syntax-nav-item active" data-section="variables">Variables</button>
      <button class="syntax-nav-item" data-section="arithmetic">Arithmetic</button>
      <button class="syntax-nav-item" data-section="strings">Strings</button>
      <button class="syntax-nav-item" data-section="if">If / Elif / Else</button>
      <button class="syntax-nav-item" data-section="match">Match</button>
      <button class="syntax-nav-item" data-section="loops">Loops</button>
      <button class="syntax-nav-item" data-section="lists">Lists</button>
      <button class="syntax-nav-item" data-section="dicts">Dicts</button>
      <button class="syntax-nav-item" data-section="functions">Functions</button>
      <button class="syntax-nav-item" data-section="trycatch">Try / Catch</button>
      <button class="syntax-nav-item" data-section="misc">Misc</button>
    </div>

    <!-- Right: content -->
    <div class="syntax-content" id="syntax-content">
      <!-- filled by JS -->
    </div>

  </div>

</main>

<footer class="bot-bar mt-10">
  <div class="max-w-7xl mx-auto px-6 flex flex-col items-center text-center space-y-4">
    <img src="assets/images/logo.png" alt="logo" class="pt-6 h-24 w-24 md:h-40 md:w-40 object-contain rounded-full">
    <h1 class="text-2xl font-bold text-white">GameScript</h1>
    <p class="text-sm text-white">&copy; 2026 GameScript. All rights reserved.</p>
    <h1 class="text-sm text-white">A Language by Ranveer Singh</h1>
  </div>
</footer>

<script>
const sections = {
  variables: {
    title: 'Variables',
    desc: 'GameScript is statically typed. Every variable needs a type keyword.',
    code: `<span class="kw">int</span>  x = <span class="nm">10</span>
<span class="kw">dec</span>  y = <span class="nm">3.14</span>
<span class="kw">word</span> name = <span class="st">"GameScript"</span>
<span class="kw">bool</span> flag = <span class="kw">true</span>`,
    example: `int x = 10\nword name = "GameScript"\nprint(x)\nprint(name)`
  },

  arithmetic: {
    title: 'Arithmetic',
    desc: 'Standard operators plus exponent and modulo.',
    code: `<span class="kw">int</span> sum  = <span class="nm">2</span> <span class="op">+</span> <span class="nm">3</span>
<span class="kw">int</span> diff = <span class="nm">10</span> <span class="op">-</span> <span class="nm">4</span>
<span class="kw">int</span> prod = <span class="nm">3</span> <span class="op">*</span> <span class="nm">4</span>
<span class="kw">int</span> quot = <span class="nm">10</span> <span class="op">/</span> <span class="nm">2</span>
<span class="kw">int</span> rem  = <span class="nm">7</span> <span class="op">%</span> <span class="nm">3</span>
<span class="kw">dec</span> pw   = <span class="nm">2.0</span> <span class="op">**</span> <span class="nm">8</span>`,
    example: `int sum = 2 + 3\ndec pw = 2.0 ** 8\nprint(sum)\nprint(pw)`
  },

  strings: {
    title: 'Strings',
    desc: 'Use curly braces for interpolation. Prefix with p for a pure (raw) string.',
    code: `<span class="kw">word</span> name = <span class="st">"GameScript"</span>
<span class="kw">word</span> msg  = <span class="st">"Hello {name}!"</span>    <span class="cm"># interpolated</span>
<span class="kw">word</span> raw  = <span class="kw">p</span><span class="st">"{name} is literal"</span>  <span class="cm"># no interpolation</span>`,
    example: `word name = "GameScript"\nword msg = "Hello {name}!"\nword raw = p"{name} is literal"\nprint(msg)\nprint(raw)`
  },

  if: {
    title: 'If / Elif / Else',
    desc: 'Standard branching. One-liner form available with then.',
    code: `<span class="kw">if</span> (x <span class="op">></span> <span class="nm">5</span>)
    <span class="fn">print</span>(<span class="st">"big"</span>)
<span class="kw">elif</span> (x <span class="op">==</span> <span class="nm">5</span>)
    <span class="fn">print</span>(<span class="st">"five"</span>)
<span class="kw">else</span>
    <span class="fn">print</span>(<span class="st">"small"</span>)

<span class="cm"># one-liner</span>
<span class="kw">if</span> x <span class="op">==</span> <span class="nm">10</span> <span class="kw">then</span> <span class="fn">print</span>(<span class="st">"ten"</span>)`,
    example: `int x = 10\nif (x > 5)\n    print("big")\nelif (x == 5)\n    print("five")\nelse\n    print("small")\nif x == 10 then print("ten")`
  },

  match: {
    title: 'Match',
    desc: 'Pattern match on a value. Use else as the default case.',
    code: `<span class="kw">match</span> x
    <span class="kw">case</span> <span class="nm">10</span>
        <span class="fn">print</span>(<span class="st">"ten"</span>)
    <span class="kw">case</span> <span class="nm">5</span>
        <span class="fn">print</span>(<span class="st">"five"</span>)
    <span class="kw">else</span>
        <span class="fn">print</span>(<span class="st">"other"</span>)`,
    example: `int x = 10\nmatch x\n    case 10\n        print("ten")\n    case 5\n        print("five")\n    else\n        print("other")`
  },

  loops: {
    title: 'Loops',
    desc: 'One loop keyword, many forms. Use break and continue as usual.',
    code: `<span class="kw">loop</span> <span class="nm">3</span>                        <span class="cm"># repeat N times</span>
    <span class="fn">print</span>(<span class="st">"tick"</span>)

<span class="kw">loop</span> (n <span class="op"><</span> <span class="nm">4</span>)                  <span class="cm"># while condition</span>
    n <span class="op">+=</span> <span class="nm">1</span>

<span class="kw">loop</span> <span class="kw">int</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">5</span>)        <span class="cm"># range iterator</span>
    <span class="fn">print</span>(i)

<span class="kw">loop</span> <span class="kw">word</span> fruit <span class="kw">in</span> fruits      <span class="cm"># list iterator</span>
    <span class="fn">print</span>(fruit)

<span class="kw">loop</span>                           <span class="cm"># infinite, needs break</span>
    <span class="kw">if</span> done <span class="kw">then</span> <span class="kw">break</span>`,
    example: `loop 3\n    print("tick")\n\nloop int i in range(5)\n    print(i)`
  },

  lists: {
    title: 'Lists',
    desc: 'Typed lists with built-in methods.',
    code: `<span class="kw">list</span><span class="op">&lt;</span><span class="ty">word</span><span class="op">&gt;</span> fruits = [<span class="st">"apple"</span>, <span class="st">"banana"</span>]

fruits.<span class="fn">append</span>(<span class="st">"cherry"</span>)
fruits.<span class="fn">remove</span>(<span class="nm">0</span>)
<span class="fn">print</span>(fruits.<span class="fn">len</span>())
<span class="fn">print</span>(fruits[<span class="nm">0</span>])
fruits[<span class="nm">0</span>] = <span class="st">"mango"</span>

<span class="kw">if</span> fruits <span class="kw">has</span> <span class="st">"mango"</span>    <span class="cm"># membership test</span>
<span class="kw">if</span> fruits <span class="kw">not has</span> <span class="st">"kiwi"</span>`,
    example: `list<word> fruits = ["apple", "banana", "cherry"]\nfruits.append("mango")\nprint(fruits.len())\nprint(fruits[0])\nif fruits has "mango"\n    print("has mango")`
  },

  dicts: {
    title: 'Dicts',
    desc: 'Key-value maps with typed keys and values.',
    code: `<span class="kw">dict</span><span class="op">&lt;</span><span class="ty">word</span>, <span class="ty">int</span><span class="op">&gt;</span> scores = {<span class="st">"alice"</span> = <span class="nm">10</span>, <span class="st">"bob"</span> = <span class="nm">20</span>}

<span class="fn">print</span>(scores[<span class="st">"alice"</span>])
scores[<span class="st">"charlie"</span>] = <span class="nm">30</span>

<span class="kw">if</span> scores.<span class="fn">has</span>(<span class="st">"bob"</span>) <span class="kw">then</span> <span class="fn">print</span>(<span class="st">"bob exists"</span>)`,
    example: `dict<word, int> scores = {"alice" = 10, "bob" = 20}\nprint(scores["alice"])\nscores["charlie"] = 30\nprint(scores["charlie"])\nif scores.has("bob") then print("bob exists")`
  },

  functions: {
    title: 'Functions',
    desc: 'Declare with fn, specify return type and parameter types. Use global for shared state.',
    code: `<span class="kw">fn</span> <span class="ty">int</span> <span class="fn">add</span>(<span class="ty">int</span> a, <span class="ty">int</span> b)
    <span class="kw">return</span> a <span class="op">+</span> b

<span class="kw">fn</span> <span class="ty">word</span> <span class="fn">greet</span>(<span class="ty">word</span> who)
    <span class="kw">return</span> <span class="st">"Hi, {who}!"</span>

<span class="fn">print</span>(<span class="fn">add</span>(<span class="nm">3</span>, <span class="nm">7</span>))
<span class="fn">print</span>(<span class="fn">greet</span>(<span class="st">"world"</span>))

<span class="kw">const</span> <span class="ty">int</span> MAX = <span class="nm">100</span>       <span class="cm"># immutable</span>
<span class="kw">global</span> <span class="ty">int</span> score = <span class="nm">0</span>     <span class="cm"># accessible everywhere</span>`,
    example: `fn int add(int a, int b)\n    return a + b\n\nfn word greet(word who)\n    return "Hi, {who}!"\n\nprint(add(3, 7))\nprint(greet("world"))`
  },

  trycatch: {
    title: 'Try / Catch',
    desc: 'Handle runtime errors gracefully.',
    code: `<span class="kw">try</span>
    <span class="kw">int</span> n = <span class="fn">toInt</span>(<span class="st">"oops"</span>)
<span class="kw">catch</span> (<span class="ty">word</span> err)
    <span class="fn">print</span>(<span class="st">"caught: {err}"</span>)`,
    example: `try\n    int n = toInt("oops")\n    print(n)\ncatch (word err)\n    print("caught: {err}")`
  },

  misc: {
    title: 'Misc',
    desc: 'Ternary, null coalescing, del, and augmented assignment.',
    code: `<span class="cm"># ternary</span>
<span class="kw">word</span> verdict = x <span class="op">></span> <span class="nm">0</span> <span class="op">?</span> <span class="st">"positive"</span> <span class="op">:</span> <span class="st">"negative"</span>

<span class="cm"># null coalescing</span>
<span class="kw">word</span> result = maybe <span class="op">??</span> <span class="st">"default"</span>

<span class="cm"># augmented assign</span>
val <span class="op">+=</span> <span class="nm">5</span>
val <span class="op">-=</span> <span class="nm">3</span>
val <span class="op">*=</span> <span class="nm">2</span>
val <span class="op">/=</span> <span class="nm">4</span>
val <span class="op">%=</span> <span class="nm">5</span>

<span class="cm"># delete a variable</span>
<span class="kw">del</span> temp`,
    example: `int x = 10\nword verdict = x > 0 ? "positive" : "negative"\nprint(verdict)\n\nword maybe = null\nword result = maybe ?? "default"\nprint(result)\n\nint val = 10\nval += 5\nval -= 3\nprint(val)`
  }
};

function render(key){
  const s = sections[key];
  const encoded = encodeURIComponent(s.example);
  document.getElementById('syntax-content').innerHTML = `
    <h4>${s.title}</h4>
    <p>${s.desc}</p>
    <div class="code-block">${s.code}</div>
    <a class="try-btn" href="play.html?code=${encoded}">▶ Try in Playground →</a>
  `;
}

document.querySelectorAll('.syntax-nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.syntax-nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.section);
  });
});

// load from URL param if present
const params = new URLSearchParams(location.search);
const initial = params.get('section') || 'variables';
const initialBtn = document.querySelector(`[data-section="${initial}"]`);
if(initialBtn){ initialBtn.classList.add('active'); document.querySelectorAll('.syntax-nav-item').forEach(b=>{ if(b!==initialBtn) b.classList.remove('active'); }); }
render(initial);
</script>

</body>
</html>
